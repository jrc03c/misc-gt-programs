author: Josh Castle <joshrcastle@gmail.com>

gtlint-directives-to-remove-on-build:
  - "@*"

input-variables:
  - name: allow_zip_code_plus_four
    default-value: 1
    description: whether or not to allow zip codes in 00000-0000 format (in addition to 00000 format)
    is-required: false
    should-clean-up: true
    should-show-in-table: true
    type: binary (0 or 1)

  - name: zip_code
    default-value:
    description: a zip code to validate; if not provided, the user will be asked for its value
    is-required: false
    should-clean-up: false
    should-show-in-table: true
    type: string

notes: >-
  Unit tests: https://www.guidedtrack.com/programs/37781

  Note that this program only confirms that a given zip code is a string in five-digit (00000) or nine-digit (00000-0000) format. It does *not* verify that the given zip code actually exists in the real world.

# other-variables-to-clean-up:
#   - foo
#   - bar
#   - baz

# other-variables-not-to-clean-up:
#   - hello
#   - world

output-variables:
  - name: name
    description: the user's name
    should-show-in-table: true
    type: string

  - name: zip_code
    description: the zip code, cleaned
    should-show-in-table: true
    type: string

  - name: zip_code_long
    description: the nine-digit zip code (i.e., in 00000-0000 format); is only defined if (1) `allow_zip_code_plus_four` = 1 and (2) `zip_code` was given in nine-digit format
    should-show-in-table: true
    type: string

  - name: zip_code_short
    description: the five-digit zip code (i.e., in 00000 format)
    should-show-in-table: true
    type: string

  - name: zip_code_is_valid
    description: whether or not the zip code is valid (i.e., is a string in five-digit or nine-digit format)
    should-show-in-table: true
    type: binary (0 or 1)

